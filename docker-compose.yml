services:
  postgres:
    image: postgres:16-alpine
    container_name: journal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-journal_construction}
      POSTGRES_USER: ${POSTGRES_USER:-journal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-journal_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: journal-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://journal_user:journal_password@postgres:5432/journal_construction?schema=public}
      PORT: ${BACKEND_PORT:-4000}
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npx prisma db push && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: journal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
